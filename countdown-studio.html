<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
/* Dark mode styles */
[data-theme="dark"] {
  --bg: #1a1a1a; --surface: #1a1a1a; --surface2: #1a1a1a;
  --border: #1a1a1a; --text: #f7f7f7; --muted: #1a1a1a;
  --accent: #ff3c00; --radius: 10px;
}

/* Light mode styles */
[data-theme="light"] {
  --bg: #f7f7f7; --surface: #f7f7f7; --surface2: #f7f7f7;
  --border: #f7f7f7; --text: #1a1a1a; --muted: #1a1a1a;
  --accent: #ff3c00; --radius: 10px;
}
body { background: var(--bg); color: var(--text); font-family: 'Roboto', sans-serif; font-size: 13px; letter-spacing: 0.02em; min-height: 100vh; overflow-x: hidden; }
header { display: flex; align-items: center; justify-content: space-between; padding: 18px 28px; border-bottom: 1px solid var(--border); }
.logo { display: flex; align-items: center; gap: 12px; }
.stuga-logo { width: 62px; height: 32px; border-radius: 6px; object-fit: contain; }
.logo-text { display: flex; flex-direction: column; }
.logo h1 { font-size: 15px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
.logo span { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; }
.badge { font-size: 10px; color: var(--muted); border: 1px solid var(--border); padding: 3px 8px; border-radius: 20px; letter-spacing: 0.1em; }
.back-btn { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: var(--radius); font-size: 12px; font-weight: 500; text-decoration: none; transition: all 0.2s ease; }
.back-btn:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
.back-btn i { font-size: 11px; }
.theme-toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 1000;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.3s ease;
  box-shadow: 0 4px 12px rgba(26,26,26,0.1);
}
.theme-toggle:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(26,26,26,0.15);
}
.theme-toggle i {
  font-size: 16px;
  color: var(--text);
  transition: color 0.3s ease;
}
.theme-toggle:hover i {
  color: var(--accent);
}
.workspace { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 57px); }
.sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
.sidebar-section { padding: 20px; border-bottom: 1px solid var(--border); }
.sidebar-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
.setting-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.setting-row:last-child { margin-bottom: 0; }
.setting-row label { color: var(--muted); font-size: 12px; }
.setting-row select { background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 11px; padding: 4px 8px; cursor: pointer; }
.setting-row input[type=text], .setting-row input[type=number] { background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 11px; padding: 4px 8px; }
.setting-row input[type=number] { width: 62px; text-align: center; }
.setting-row input[type=text] { width: 96px; }
.color-row { margin-bottom: 14px; }
.color-row label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 8px; }
.color-row:last-child { margin-bottom: 0; }
.swatches { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.swatch { width: 22px; height: 22px; border-radius: 5px; cursor: pointer; border: 1.5px solid rgba(247,247,247,0.1); flex-shrink: 0; transition: transform 0.1s, border-color 0.1s; }
.swatch:hover, .swatch.active { transform: scale(1.18); border-color: var(--accent); }
input[type=color].swatch { padding: 1px; }
.sidebar-actions { padding: 20px; margin-top: auto; display: flex; flex-direction: column; gap: 10px; }
.btn { width: 100%; padding: 11px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; letter-spacing: 0.04em; cursor: pointer; border: none; transition: background 0.15s, opacity 0.15s, transform 0.1s; }
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.35; cursor: default; }
.btn-primary { background: var(--accent); color: #1a1a1a; }
.btn-primary:hover:not(:disabled) { background: #ff3c00; }
.btn-export { background: linear-gradient(135deg, #ff3c00, #ff3c00); color: #f7f7f7; }
.btn-export:hover:not(:disabled) { background: linear-gradient(135deg, #1a1a1a, #ff3c00); }
.main-area { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 28px; overflow: hidden; }
#canvas-container { position: relative; flex-shrink: 0; }
#canvas-container canvas { display: block; border-radius: 10px; box-shadow: 0 8px 60px rgba(26,26,26,0.6); }
.controls { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 40px; padding: 8px 16px; }
.ctrl-btn { background: none; border: none; color: var(--text); cursor: pointer; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: background 0.15s; }
.ctrl-btn:hover { background: var(--surface2); }
.ctrl-divider { width: 1px; height: 20px; background: var(--border); }
.timeline { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
#timeline-scrub { -webkit-appearance: none; appearance: none; width: 140px; height: 3px; background: var(--border); border-radius: 3px; outline: none; cursor: pointer; }
#timeline-scrub::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); cursor: pointer; }
.loop-label { font-size: 11px; color: var(--muted); cursor: pointer; user-select: none; }
.loop-label.on { color: var(--accent); }
#export-overlay { display: none; position: fixed; inset: 0; background: rgba(26,26,26,0.85); backdrop-filter: blur(6px); z-index: 100; align-items: center; justify-content: center; }
#export-overlay.visible { display: flex; }
.export-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 340px; text-align: center; }
.export-panel h3 { font-size: 16px; margin-bottom: 6px; }
.export-panel p { color: var(--muted); font-size: 13px; margin-bottom: 24px; line-height: 1.6; }
.progress-track { background: var(--surface2); border-radius: 4px; height: 4px; overflow: hidden; margin-bottom: 10px; }
#progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #ff3c00); border-radius: 4px; width: 0%; transition: width 0.1s; }
#progress-label { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 20px; }
@keyframes spin { to { transform: rotate(360deg); } }
#export-cancel { background: none; border: 1px solid var(--border); color: var(--muted); padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 12px; }
#export-cancel:hover { color: var(--text); border-color: #1a1a1a; }
#toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: 8px; font-size: 13px; opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s; z-index: 200; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Stuga minimalist theme */
:root,
[data-theme="dark"],
[data-theme="light"] {
  --bg: #f7f7f7;
  --surface: #f7f7f7;
  --surface2: #f7f7f7;
  --border: #1a1a1a;
  --text: #1a1a1a;
  --muted: #1a1a1a;
  --accent: #ff3c00;
  --accent2: #ff3c00;
  --radius: 8px;
}
body { background: #f7f7f7; color: #1a1a1a; }
header,
.sidebar,
.controls,
.export-panel,
#toast,
#drop-zone,
.thumb-item,
.thumb-placeholder,
.progress-track,
.setting-row select,
.setting-row input,
.color-row input,
.field input,
.back-btn,
.theme-toggle {
  background: #f7f7f7 !important;
  color: #1a1a1a !important;
  border-color: #1a1a1a !important;
  box-shadow: none !important;
}
.btn,
.back-btn,
.ctrl-btn,
#export-cancel,
input,
select,
#drop-zone,
.thumb-item,
.thumb-placeholder,
.controls,
.export-panel,
#toast,
.swatch,
.gradient-swatch {
  border-radius: 6px !important;
}
.btn-primary,
.btn-export,
#progress-fill,
.ctrl-btn:hover,
#drop-zone:hover,
#drop-zone.drag-over {
  background: #ff3c00 !important;
  color: #f7f7f7 !important;
}
.btn-export:hover:not(:disabled),
.btn-primary:hover:not(:disabled),
.back-btn:hover {
  background: #ff3c00 !important;
  color: #1a1a1a !important;
}
#canvas-container canvas { box-shadow: none !important; border: 1px solid #1a1a1a; border-radius: 8px !important; }
.sidebar-section,
header,
.sidebar,
.controls { border-color: #1a1a1a !important; }

/* Responsive Design */
@media (max-width: 768px) {
  .workspace {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
    height: calc(100vh - 57px);
  }
  
  .sidebar {
    border-right: none;
    border-bottom: 1px solid var(--border);
    max-height: 40vh;
    overflow-y: auto;
  }
  
  .sidebar-section {
    padding: 16px;
  }
  
  .sidebar-actions {
    padding: 16px;
  }
  
  .main-area {
    padding: 16px;
    gap: 16px;
  }
  
  #canvas-container canvas {
    max-width: 100%;
    height: auto;
    border-radius: 8px;
  }
  
  .controls {
    padding: 6px 12px;
    gap: 8px;
    border-radius: 30px;
  }
  
  .ctrl-btn {
    width: 30px;
    height: 30px;
    font-size: 12px;
  }
  
  #sequence-grid {
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
  }
  
  .thumb-item {
    aspect-ratio: 16/10;
  }
  
  .setting-row {
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 16px;
  }
  
  .setting-row label {
    font-size: 11px;
  }
  
  .setting-row select {
    width: 100%;
    padding: 6px 10px;
    font-size: 12px;
  }
  
  .btn {
    padding: 10px 14px;
    font-size: 12px;
  }
  
  #drop-zone {
    padding: 16px 12px;
  }
  
  #drop-zone .drop-icon {
    font-size: 24px;
    margin-bottom: 8px;
  }
  
  #drop-zone p {
    font-size: 11px;
  }
  
  #drop-zone .btn-upload {
    margin-top: 10px;
    padding: 6px 12px;
    font-size: 11px;
  }
}

@media (max-width: 480px) {
  .workspace {
    height: calc(100vh - 50px);
  }
  
  header {
    padding: 12px 16px;
  }
  
  .logo h1 {
    font-size: 14px;
  }
  
  .logo span {
    font-size: 10px;
  }
  
  .sidebar {
    max-height: 35vh;
  }
  
  .sidebar-section {
    padding: 12px;
  }
  
  .sidebar-actions {
    padding: 12px;
  }
  
  .main-area {
    padding: 12px;
    gap: 12px;
  }
  
  #sequence-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 4px;
  }
  
  .controls {
    padding: 4px 8px;
    gap: 6px;
    border-radius: 25px;
  }
  
  .ctrl-btn {
    width: 28px;
    height: 28px;
    font-size: 11px;
  }
  
  .setting-row select {
    padding: 5px 8px;
    font-size: 11px;
  }
  
  .btn {
    padding: 8px 12px;
    font-size: 11px;
  }
  
  #drop-zone {
    padding: 12px 8px;
  }
  
  #drop-zone .drop-icon {
    font-size: 20px;
  }
  
  #drop-zone p {
    font-size: 10px;
  }
}

    <button id="export-cancel">Cancel</button>
  </div>
</div>

<div id="toast"></div>

<script type="module">
// ────────────────────────────────────────────────────────
//  CANVAS / TIMING
// ────────────────────────────────────────────────────────
let CW = 1080, CH = 1350;
const FPS       = 60;
const ENT_FRAMES  = 22;  // bounce-in duration
const EXIT_FRAMES = 14;  // flash-out duration

// ────────────────────────────────────────────────────────
//  SETTINGS
// ────────────────────────────────────────────────────────
let countFrom  = 5;
let endText    = 'GO!';
let bgColor    = '#ff3c00';
let numColor   = '#1a1a1a';
let flashColor = '#f7f7f7';
let fontFamily = 'Impact';
let showRings  = true;
let speedMult  = 1;
let holdFrames = 52;

// ────────────────────────────────────────────────────────
//  DERIVED / STATE
// ────────────────────────────────────────────────────────
function getSlides() {
  const s = [];
  for (let n = countFrom; n >= 1; n--) s.push(String(n));
  if ((endText || '').trim()) s.push(endText.trim());
  return s;
}
function getFPD() { return ENT_FRAMES + holdFrames + EXIT_FRAMES; }
function getTotalFrames() { return getSlides().length * getFPD(); }

let frame = 0, totalFrames = getTotalFrames();
let isPlaying = true, isLooping = true;
let rafId = null, lastTs = null, acc = 0;
let exportAborted = false, isScrubbing = false;

// ────────────────────────────────────────────────────────
//  FONT SIZE  (binary-search to fill 84% width)
// ────────────────────────────────────────────────────────
const _mc = document.createElement('canvas').getContext('2d');
const _fsCache = {};
function autoFontSize(text, maxW) {
  const key = `${text}|${Math.round(maxW)}|${fontFamily}`;
  if (_fsCache[key]) return _fsCache[key];
  let lo = 30, hi = 3000;
  while (hi - lo > 2) {
    const mid = (lo + hi) >> 1;
    _mc.font = `900 ${mid}px ${fontFamily}`;
    (_mc.measureText(text).width < maxW) ? (lo = mid) : (hi = mid);
  }
  return (_fsCache[key] = lo);
}

// ────────────────────────────────────────────────────────
//  EASING
// ────────────────────────────────────────────────────────
function easeOut(t) { return 1 - (1 - t) * (1 - t); }
function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
function easeElastic(t) {
  if (t <= 0) return 0; if (t >= 1) return 1;
  const c = (2 * Math.PI) / 3;
  return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c) + 1;
}

// ────────────────────────────────────────────────────────
//  RENDER
// ────────────────────────────────────────────────────────
function render(canvas, f) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const sx = W / 1080, sy = H / 1350;
  const midX = W / 2, midY = H / 2;

  const slides = getSlides();
  const FPD    = getFPD();
  const n      = slides.length;

  const slideIdx = Math.min(Math.floor(f / FPD), n - 1);
  const local    = f - slideIdx * FPD;

  // ── Background ───────────────────────────────────────────
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, W, H);

  // ── Decorative rings ───────────────────────────────────────
  // Animate during entrance, subtle during hold
  const entP  = Math.min(local / ENT_FRAMES, 1); // 0→1 during entrance
  const RING_SIZES  = [0.38, 0.57, 0.76]; // fraction of Math.min(W,H)/2
  const RING_SCALES = [140, 116.74, 94.14]; // match original Lottie stagger (% of final)

  if (showRings) {
    const base = Math.min(W, H);
    RING_SIZES.forEach((r, i) => {
      const stagger   = i * 0.12;
      const rProgress = Math.min(Math.max((entP - stagger) / (1 - stagger), 0), 1);
      const startS    = RING_SCALES[i] / 100;
      const s         = startS + (1 - startS) * easeElastic(rProgress);
      const radius    = base * r * s;
      const alpha     = 0.06 + 0.04 * (1 - rProgress);
      ctx.beginPath();
      ctx.arc(midX, midY, radius, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(26,26,26,${alpha})`;
      ctx.lineWidth   = 3 * Math.min(sx, sy);
      ctx.stroke();
    });
  }

  // ── Current slide text ─────────────────────────────────────
  const text     = slides[slideIdx];
  const fontSize = autoFontSize(text, W * 0.84);

  // Entrance: elastic scale 1.4 → 1.0
  let numScale = 1;
  if (local < ENT_FRAMES) {
    const t    = local / ENT_FRAMES;
    numScale   = 1.4 + (1 - 1.4) * easeElastic(t); // 1.4 → 1.0 with overshoot
  }

  // Flash alpha: builds in last EXIT_FRAMES of this digit
  let flashAlpha = 0;
  if (local >= FPD - EXIT_FRAMES) {
    flashAlpha = easeInOut((local - (FPD - EXIT_FRAMES)) / EXIT_FRAMES);
  }
  // Also fades as carry-over from previous digit's flash (localFrame < EXIT_FRAMES)
  if (local < EXIT_FRAMES) {
    flashAlpha = Math.max(flashAlpha, 1 - easeOut(local / EXIT_FRAMES));
  }

  // Draw number
  ctx.save();
  ctx.translate(midX, midY);
  ctx.scale(numScale, numScale);
  ctx.font        = `900 ${fontSize}px ${fontFamily}`;
  ctx.textAlign   = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle   = numColor;
  ctx.fillText(text, 0, 0);
  ctx.restore();

  // â”€â”€ Flash overlay â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  if (flashAlpha > 0.001) {
    ctx.fillStyle = flashColor;
    ctx.globalAlpha = flashAlpha;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }

  // â”€â”€ Dot progress indicators â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  if (n > 1) {
    const dotR   = 5 * Math.min(sx, sy);
    const dotGap = dotR * 4;
    const totalW = (n - 1) * dotGap;
    const dotY   = H - 48 * sy;
    for (let i = 0; i < n; i++) {
      const dx = midX - totalW / 2 + i * dotGap;
      const done = i < slideIdx || (i === slideIdx && local >= FPD - EXIT_FRAMES);
      ctx.beginPath();
      ctx.arc(dx, dotY, dotR, 0, Math.PI * 2);
      ctx.fillStyle = done
        ? numColor
        : `rgba(${hexToRgb(numColor)},0.25)`;
      ctx.fill();
    }
  }
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
//  ANIMATION LOOP
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function tick(ts) {
  if (!isPlaying) return;
  if (!lastTs) lastTs = ts;
  acc += (ts - lastTs) * speedMult;
  lastTs = ts;
  const fd = 1000 / FPS;
  while (acc >= fd) { frame++; acc -= fd; }
  if (frame >= totalFrames) {
    if (isLooping) frame = 0; else { frame = totalFrames - 1; pause(); }
  }
  renderPreview(); updateScrubber();
  rafId = requestAnimationFrame(tick);
}
function play()    { if (isPlaying) return; isPlaying = true; lastTs = null; acc = 0; document.getElementById('btn-play').textContent = 'â¸'; rafId = requestAnimationFrame(tick); }
function pause()   { isPlaying = false; if (rafId) cancelAnimationFrame(rafId); document.getElementById('btn-play').textContent = 'â–¶'; }
function restart() { frame = 0; renderPreview(); updateScrubber(); if (!isPlaying) play(); }

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
//  PREVIEW CANVAS
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
let previewCanvas;
function initCanvas() {
  previewCanvas = document.getElementById('preview-canvas');
  previewCanvas.width = CW; previewCanvas.height = CH;
  const ma = document.getElementById('main-area');
  const sf = Math.min((ma.clientWidth - 56) / CW, (ma.clientHeight - 90) / CH, 1);
  previewCanvas.style.width  = Math.round(CW * sf) + 'px';
  previewCanvas.style.height = Math.round(CH * sf) + 'px';
}
function renderPreview() { if (previewCanvas) render(previewCanvas, frame); }
function ratioLabel(w, h) {
  const gcd = (a, b) => b ? gcd(b, a % b) : a;
  const d = gcd(w, h);
  return `${w / d}:${h / d}`;
}
function updateDimensionBadge() {
  document.getElementById('dim-badge').textContent = `${ratioLabel(CW, CH)} | 60fps | ${CW}x${CH}`;
}
function clampDimension(value, fallback) {
  const n = parseInt(value, 10);
  return Math.max(360, Math.min(3840, Math.round((Number.isFinite(n) ? n : fallback) / 2) * 2));
}
function applyDimensions(w, h) {
  CW = clampDimension(w, CW);
  CH = clampDimension(h, CH);
  document.getElementById('input-w').value = CW;
  document.getElementById('input-h').value = CH;
  updateDimensionBadge();
  Object.keys(_fsCache).forEach(k => delete _fsCache[k]);
  initCanvas();
  renderPreview();
}
function setupCanvasSizeControls() {
  const presets = [
    { label: '4:5', w: 1080, h: 1350 },
    { label: '9:16', w: 1080, h: 1920 },
    { label: '16:9', w: 1920, h: 1080 },
    { label: '1:1', w: 1080, h: 1080 },
    { label: '4:3', w: 1600, h: 1200 },
  ];
  const presetsEl = document.getElementById('size-presets');
  let lockRatio = true;
  let lockedRatio = CW / CH;
  presets.forEach(p => {
    const btn = document.createElement('button');
    btn.textContent = p.label;
    btn.style.cssText = 'background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-size:10px;padding:4px 10px;cursor:pointer;letter-spacing:0.08em';
    btn.addEventListener('click', () => { lockedRatio = p.w / p.h; applyDimensions(p.w, p.h); });
    presetsEl.appendChild(btn);
  });
  document.getElementById('btn-lock-ratio').addEventListener('click', () => {
    lockRatio = !lockRatio;
    lockedRatio = CW / CH;
    document.getElementById('btn-lock-ratio').style.color = lockRatio ? 'var(--accent)' : 'var(--muted)';
  });
  document.getElementById('input-w').addEventListener('change', e => {
    const w = clampDimension(e.target.value, CW);
    applyDimensions(w, lockRatio ? Math.round(w / lockedRatio) : CH);
  });
  document.getElementById('input-h').addEventListener('change', e => {
    const h = clampDimension(e.target.value, CH);
    applyDimensions(lockRatio ? Math.round(h * lockedRatio) : CW, h);
  });
  document.getElementById('btn-lock-ratio').style.color = 'var(--accent)';
  updateDimensionBadge();
}
function updateScrubber() {
  const s = document.getElementById('timeline-scrub');
  if (!isScrubbing) s.value = (frame / totalFrames * 100).toFixed(1);
  document.getElementById('time-current').textContent = (frame / FPS).toFixed(1) + 's';
}
function refreshAnimation() {
  totalFrames = getTotalFrames();
  frame = Math.min(frame, totalFrames - 1);
  document.getElementById('time-total').textContent = (totalFrames / FPS).toFixed(1) + 's';
  renderPreview(); updateScrubber();
}

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
//  EXPORT
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
async function exportMP4() {
  let Muxer, ArrayBufferTarget;
  try {
    const mod = await import('https://cdn.jsdelivr.net/npm/mp4-muxer@5/build/mp4-muxer.mjs');
    Muxer = mod.Muxer; ArrayBufferTarget = mod.ArrayBufferTarget;
  } catch { exportWithMediaRecorder(); return; }
  if (!('VideoEncoder' in window)) { exportWithMediaRecorder(); return; }

  pause(); exportAborted = false; showExportOverlay();
  const offC = document.createElement('canvas');
  offC.width = CW; offC.height = CH;
  const target  = new ArrayBufferTarget();
  const muxer   = new Muxer({ target, video: { codec: 'avc', width: CW, height: CH }, fastStart: 'in-memory' });
  const encoder = new VideoEncoder({
    output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
    error:  (e) => { showToast('Encoding error: ' + e.message); hideExportOverlay(); },
  });
  const codec = (await VideoEncoder.isConfigSupported({ codec: 'avc1.640029', width: CW, height: CH, bitrate: 14_000_000, framerate: FPS })).supported
    ? 'avc1.640029' : 'avc1.640032';
  encoder.configure({ codec, width: CW, height: CH, bitrate: 14_000_000, framerate: FPS, latencyMode: 'quality' });

  let f = 0;
  function encodeNext() {
    if (exportAborted) { encoder.close(); hideExportOverlay(); return; }
    if (f >= totalFrames) {
      encoder.flush().then(() => {
        muxer.finalize();
        const blob = new Blob([target.buffer], { type: 'video/mp4' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href = url; a.download = `countdown-${Date.now()}.mp4`;
        a.click(); setTimeout(() => URL.revokeObjectURL(url), 5000);
        hideExportOverlay(); showToast('Countdown exported!');
      });
      return;
    }
    render(offC, f);
    const vf = new VideoFrame(offC, { timestamp: Math.round(f/FPS*1_000_000), duration: Math.round(1_000_000/FPS) });
    encoder.encode(vf, { keyFrame: f % (FPS*2) === 0 }); vf.close();
    setProgress(f / totalFrames); f++;
    if (f % 4 === 0) setTimeout(encodeNext, 0); else encodeNext();
  }
  encodeNext();
}

function exportWithMediaRecorder() {
  pause(); exportAborted = false; showExportOverlay();
  const offC = document.createElement('canvas');
  offC.width = CW; offC.height = CH;
  const stream = offC.captureStream(FPS);
  
  // Try MP4-capable codecs first, then fallback to WebM
  const types = ['video/mp4;codecs=h264', 'video/mp4;codecs=hev1', 'video/webm;codecs=h264', 'video/webm;codecs=vp9', 'video/webm'];
  const mime = types.find(t => MediaRecorder.isTypeSupported(t)) || 'video/webm';
  
  const rec = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 14_000_000 });
  const chunks = [];
  rec.ondataavailable = e => chunks.push(e.data);
  rec.onstop = () => {
    const blob = new Blob(chunks, { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    
    // Use appropriate extension based on actual mime type
    const extension = mime.startsWith('video/mp4') ? 'mp4' : 'webm';
    a.download = `countdown-${Date.now()}.${extension}`;
    
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    
    // Show appropriate message
    const formatMessage = extension === 'mp4' ? 'MP4 video exported!' : 'WebM video exported (browser limitation)';
    hideExportOverlay(); showToast(formatMessage);
  };
  rec.start();
  let f = 0;
  function nextFrame() {
    if (exportAborted) { rec.stop(); return; }
    if (f >= totalFrames) { setTimeout(() => rec.stop(), 200); return; }
    render(offC, f); setProgress(f / totalFrames); f++;
    setTimeout(nextFrame, 1000 / FPS);
  }
  nextFrame();
}

function showExportOverlay() { document.getElementById('export-overlay').classList.add('visible'); setProgress(0); }
function hideExportOverlay() { document.getElementById('export-overlay').classList.remove('visible'); }
function setProgress(p) {
  document.getElementById('progress-fill').style.width  = (p*100).toFixed(0) + '%';
  document.getElementById('progress-label').textContent = (p*100).toFixed(0) + '%';
}

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
//  TOAST
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
//  SWATCH BUILDER
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function buildSwatches(wrapperId, pickerId, colors, setCb) {
  const wrap   = document.getElementById(wrapperId);
  const picker = document.getElementById(pickerId);
  colors.forEach(c => {
    const s = document.createElement('div');
    s.className = 'swatch'; s.style.background = c; s.title = c;
    s.addEventListener('click', () => { setCb(c); picker.value = c; renderPreview(); });
    wrap.appendChild(s);
  });
  picker.addEventListener('input', e => { setCb(e.target.value); renderPreview(); });
}

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
//  EVENT WIRING
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
document.addEventListener('DOMContentLoaded', () => {
  initCanvas();
  refreshAnimation();
  setupCanvasSizeControls();
  play();

  // Countdown settings
  document.getElementById('count-from').addEventListener('input', e => {
    countFrom = Math.max(1, Math.min(9, parseInt(e.target.value) || 5));
    Object.keys(_fsCache).forEach(k => delete _fsCache[k]);
    refreshAnimation();
  });
  document.getElementById('end-text').addEventListener('input', e => {
    endText = e.target.value;
    Object.keys(_fsCache).forEach(k => delete _fsCache[k]);
    refreshAnimation();
  });

  // Colors
  buildSwatches('bg-swatches', 'bg-picker',
    ['#ff3c00','#ff3c00','#1a1a1a','#1a1a1a','#1a1a1a','#1a1a1a','#f7f7f7','#f7f7f7'],
    c => { bgColor = c; }
  );
  buildSwatches('num-swatches', 'num-picker',
    ['#1a1a1a','#1a1a1a','#1a1a1a','#1a1a1a','#ff3c00','#ff3c00','#f7f7f7','#f7f7f7'],
    c => { numColor = c; }
  );
  buildSwatches('flash-swatches', 'flash-picker',
    ['#f7f7f7','#f7f7f7','#ff3c00','#ff3c00','#1a1a1a','#1a1a1a','#1a1a1a','#1a1a1a'],
    c => { flashColor = c; }
  );

  // Style
  document.getElementById('font-select').addEventListener('change', e => {
    fontFamily = e.target.value;
    Object.keys(_fsCache).forEach(k => delete _fsCache[k]);
    renderPreview();
  });
  document.getElementById('rings-select').addEventListener('change', e => {
    showRings = e.target.value === '1'; renderPreview();
  });
  document.getElementById('size-select').addEventListener('change', e => {
    const [w, h] = e.target.value.split('x').map(Number);
    CW = w; CH = h;
    const label = w === 1080 && h === 1350 ? '4:5' : w === 1080 && h === 1920 ? '9:16' : w === h ? '1:1' : '16:9';
    document.getElementById('dim-badge').textContent = `${label} Â· 60fps Â· ${w}Ã—${h}`;
    Object.keys(_fsCache).forEach(k => delete _fsCache[k]);
    initCanvas(); renderPreview();
  });

  // Timing
  document.getElementById('speed-slider').addEventListener('input', e => { 
  speedMult = parseFloat(e.target.value); 
  document.getElementById('speed-value').textContent = speedMult.toFixed(2) + 'x';
});
  document.getElementById('hold-select').addEventListener('change', e => {
    holdFrames = parseInt(e.target.value); refreshAnimation();
  });

  // Playback controls
  document.getElementById('btn-preview').addEventListener('click', () => { frame = 0; if (!isPlaying) play(); });
  document.getElementById('btn-export').addEventListener('click', exportMP4);
  document.getElementById('btn-play').addEventListener('click', () => { if (isPlaying) pause(); else play(); });
  document.getElementById('btn-restart').addEventListener('click', restart);
  document.getElementById('loop-toggle').addEventListener('click', () => {
    isLooping = !isLooping; document.getElementById('loop-toggle').classList.toggle('on', isLooping);
  });

  const scrub = document.getElementById('timeline-scrub');
  scrub.addEventListener('mousedown', () => { isScrubbing = true; pause(); });
  scrub.addEventListener('input',     () => { frame = Math.round(+scrub.value/100*totalFrames); renderPreview(); document.getElementById('time-current').textContent = (frame/FPS).toFixed(1)+'s'; });
  scrub.addEventListener('mouseup',   () => { isScrubbing = false; play(); });

  document.getElementById('export-cancel').addEventListener('click', () => { exportAborted = true; hideExportOverlay(); });

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    if (e.code === 'Space') { e.preventDefault(); if (isPlaying) pause(); else play(); }
    if (e.code === 'KeyR') restart();
    if (e.code === 'KeyL') document.getElementById('loop-toggle').click();
  });

  new ResizeObserver(() => { initCanvas(); renderPreview(); }).observe(document.getElementById('main-area'));
});
// Theme Toggle Functionality
class ThemeManager {
  constructor() {
    this.themeToggle = document.getElementById('theme-toggle');
    this.themeIcon = document.getElementById('theme-icon');
    this.html = document.documentElement;
    
    this.init();
  }

  init() {
    // Load saved theme or default to dark
    const savedTheme = localStorage.getItem('theme') || 'dark';
    this.setTheme(savedTheme);
    
    // Add click listener
    this.themeToggle.addEventListener('click', () => {
      this.toggleTheme();
    });
  }

  setTheme(theme) {
    this.html.setAttribute('data-theme', theme);
    document.body.setAttribute('data-theme', theme);
    this.updateIcon(theme);
    localStorage.setItem('theme', theme);
  }

  toggleTheme() {
    const currentTheme = this.html.getAttribute('data-theme');
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    this.setTheme(newTheme);
  }

  updateIcon(theme) {
    this.themeIcon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
  }
}

// Initialize theme manager
document.addEventListener('DOMContentLoaded', () => {
  new ThemeManager();
});
</script>
